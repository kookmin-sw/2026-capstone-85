name: Deploy GitHub Pages

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static web
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure GitHub Pages paths
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          if [[ "${repo_name}" == *.github.io ]]; then
            base_path=""
          else
            base_path="/${repo_name}"
          fi

          {
            echo "NEXT_PUBLIC_APP_ENV=github-pages"
            echo "NEXT_PUBLIC_BASE_PATH=${base_path}"
            echo "NEXT_PUBLIC_ASSET_PREFIX=${base_path}"
          } >> "${GITHUB_ENV}"

      - name: Build static export
        run: npm run build:web:static

      - name: Disable Jekyll processing
        run: touch apps/web/out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
