services:
  postgres:
    image: postgres:16-alpine
    container_name: cpa-job-platform-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cpa
      POSTGRES_PASSWORD: cpa
      POSTGRES_DB: cpa_jobs
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
